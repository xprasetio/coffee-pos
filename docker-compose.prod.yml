services:
  mysql:
    image: mysql:8.0
    container_name: coffee-pos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - coffee-pos-network

  redis:
    image: redis:7-alpine
    container_name: coffee-pos-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: "redis-cli -a $$REDIS_PASSWORD ping"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - coffee-pos-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-pos-app
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coffee-pos-network

networks:
  coffee-pos-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
